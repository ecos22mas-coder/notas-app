<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mis notas</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="app">
    <section class="hero">
      <p class="eyebrow">Bloc de notas</p>
      <h1>Guarda ideas, recordatorios y tareas en un solo lugar.</h1>
      <p class="intro">Escribe una nota y quedará guardada en tu navegador para volver a verla después.</p>
    </section>

    <section class="composer">
      <form id="note-form" class="note-form">
        <label class="sr-only" for="note-input">Escribe tu nota</label>
        <textarea
          id="note-input"
          name="note"
          rows="5"
          placeholder="Escribe aquí tu nota..."
          required
        ></textarea>
        <div class="form-actions">
          <span id="status-message" class="status-message" aria-live="polite"></span>
          <button type="submit" id="submit-button">Guardar nota</button>
        </div>
      </form>
    </section>

    <section class="notes-panel">
      <div class="notes-header">
        <h2>Tus notas</h2>
        <button type="button" id="clear-all-button" class="ghost-button">Borrar todas</button>
      </div>
      <div id="empty-state" class="empty-state">
        Todavía no hay notas. Crea la primera para empezar.
      </div>
      <ul id="notes-list" class="notes-list" aria-live="polite"></ul>
    </section>
  </main>

  <template id="note-template">
    <li class="note-card">
      <div>
        <p class="note-content"></p>
        <p class="note-date"></p>
      </div>
      <div class="note-actions">
        <button type="button" class="edit-button">Editar</button>
        <button type="button" class="delete-button">Eliminar</button>
      </div>
    </li>
  </template>

  <script src="app.js"></script>
</body>
</html>
